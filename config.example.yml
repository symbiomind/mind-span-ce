server:
  # agent: the AI agent this bridge serves
  agent:
    name: Lyra  # name presented to the LLM provider
    # Default endpoint — can be overridden per role
    endpoint:
      plugins:
        OpenAI-Provider:
          url: http://your-openclaw-host:port/v1
          auth: Bearer         # Bearer or oAuth
          token: ${BRIDGE_API_TOKEN}  # set in .env
          model: openclaw/main
          # headers: # future use — passthru by default
          #  allow:
          #  deny:
          #  insert:

    roles:
      mainSession:
        # Uncomment to override the default endpoint for this role
        # endpoint:
        #   plugins:
        #     OpenAI-Provider:
        #       model: openclaw/main:custom
        session:
          plugins:
            memory-mcp-ce:
              url: http://your-memory-mcp-ce-host:port
              auth: Bearer     # Bearer or oAuth
              token: ${MEMORY_API_TOKEN}  # set in .env
              options:
                source: agent:lyra:main
                # num_results: 5
                # labels: ""

      cron:
        endpoint:
          plugins:
            OpenAI-Provider:
              url: http://your-openclaw-host:port/v1
              auth: Bearer
              token: ${BRIDGE_CRON_TOKEN}  # set in .env
              model: openclaw/main:cron

    users:
      # Users map to roles — token authenticates this bridge connection
      YourName:
        name: YourName
        role: mainSession
        token: ${USER_MAIN_TOKEN}  # set in .env
      LyraCron:
        name: system-cron-event
        role: cron
        token: ${USER_CRON_TOKEN}  # set in .env
