server:
  # Four clean concerns — each owns exactly one thing:
  #
  #   resources   = WHERE  — backend endpoint definition
  #   sessions    = HOW    — conversation management (optional — omit to let backend own it)
  #   roles       = WHAT   — plugins, capabilities, context injection
  #   identities  = WHO    — token → identity → role → resource
  #
  # Full annotated reference: notes/config-idea.yml
  # Locked design decisions: notes/ROADMAP.md
  # Plugin interface: notes/PLUGIN-DESIGN.md
  # ctx contract for plugin authors: notes/CONTEXT-SCHEMA.md

  # ──────────────────────────────────────────────────────────────────
  # RESOURCES — backend endpoints (WHERE requests are forwarded)
  # ──────────────────────────────────────────────────────────────────
  resources:
    openclaw:
      endpoint:
        plugins:
          OpenAI-Provider:
            url: http://your-openclaw-host:port/v1
            auth: Bearer
            token: ${OPENCLAW_API_KEY}    # set in .env

    # Example: direct Anthropic (future — not yet implemented)
    # claude_direct:
    #   endpoint:
    #     plugins:
    #       Anthropic-Provider:           # future provider plugin
    #         model: claude-sonnet-4-6
    #         token: ${ANTHROPIC_API_KEY}

  # ──────────────────────────────────────────────────────────────────
  # SESSIONS — conversation management (HOW history is managed)
  # Optional. Omit if you want the backend to own the session.
  # ──────────────────────────────────────────────────────────────────
  # sessions:
  #   main_session:
  #     system_prompt: "You are..."    # bridge injects this (future: direct-provider mode)
  #     store: true                    # retain turn history
  #     history_window: 20             # how many turns to keep

  # ──────────────────────────────────────────────────────────────────
  # ROLES — capability sets (WHAT plugins and context run)
  # ──────────────────────────────────────────────────────────────────
  roles:
    mainSession:
      resource: openclaw           # references a key from resources: above
      model: openclaw/main         # model override (optional)
      # session: main_session      # reference a sessions: key (optional)
      context:
        plugins:
          time_inject:
            timezone: "Australia/Adelaide"   # any IANA timezone
          # memory_recall:                   # future builtin plugin
          #   num_results: 5
          #   token: ${MEMORY_TOKEN}

    cron_role:
      resource: openclaw
      model: openclaw/main
      context:
        plugins:
          time_inject:
            timezone: "Australia/Adelaide"
          # intentionally no memory_recall — cron/automated callers skip memory

  # ──────────────────────────────────────────────────────────────────
  # IDENTITIES — who can call the bridge (WHO)
  # ──────────────────────────────────────────────────────────────────
  identities:
    # Human caller — full context injection
    YourName_main:
      context:
        name: YourName             # → <caller>YourName</caller>
        trust: trusted             # → <caller trust="trusted">YourName</caller>
      role: mainSession
      token: ${USER_MAIN_TOKEN}    # set in .env — globally unique
      client_mode: librechat       # strip LibreChat history injection

    # Automated caller — minimal injection, no trace
    system_cron:
      context:
        name: system_cron
        trust: system
      role: cron_role
      token: ${CRON_TOKEN}         # set in .env — different token from above
      # no client_mode — cron hits API directly

    # client_mode values:
    #   raw (default)  — trust whatever arrives, no stripping
    #   librechat      — strip full history LibreChat sends each turn (keep last user msg only)
